<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI/IT 日报 - {{date}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .header .date {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .news-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }
        .news-item:last-child {
            margin-bottom: 0;
        }
        .news-item h3 {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .news-item p {
            color: #555;
            font-size: 0.95em;
        }
        .news-item .source {
            margin-top: 10px;
            font-size: 0.85em;
            color: #888;
        }
        .news-item .source a {
            color: #667eea;
            text-decoration: none;
        }
        .news-item .source a:hover {
            text-decoration: underline;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #888;
            font-size: 0.9em;
        }
        .emoji {
            font-size: 1.5em;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="emoji">🤖</span>AI/IT 日报</h1>
            <div class="date">{{date}}</div>
        </div>
        <div class="content">
            {{news_content}}
        </div>
        <div class="footer">
            <p>由 🦞 龙虾 1 号 自动生成 | <a href="index.html" style="color:#667eea">查看历史归档</a></p>
        </div>
    </div>
</body>
</html>
